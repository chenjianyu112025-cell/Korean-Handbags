<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXTREND INTERNATIONAL | 재정의된 럭셔리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f9f9f7;
            color: #333;
        }
        .section-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        img {
            width: 100%;
            display: block;
            height: auto;
        }
        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 py-4">
        <div class="max-w-screen-md mx-auto px-6 flex justify-between items-center">
            <span class="font-bold tracking-widest text-lg">LUXTREND</span>
            <div class="space-x-6 text-sm font-medium text-gray-500">
                <span>COLLECTION</span>
                <span>QUALITY</span>
                <span>REVIEWS</span>
            </div>
        </div>
    </nav>

    <main class="section-container pb-20">
        
        <!-- 1. 品牌介绍 -->
        <section id="intro" class="fade-in">
            <img src="https://sc01.alicdn.com/kf/A80e7f18ab745472ea8ee5bb7b80596dcD.png" alt="Brand Intro">
        </section>

        <!-- 2. Lookbook -->
        <section id="lookbook" class="mt-4">
            <img src="https://sc01.alicdn.com/kf/A923023e054414d268681579165ef533dL.png" alt="Lookbook">
        </section>

        <!-- 3. 细节展示 -->
        <section id="details" class="mt-4">
            <img src="https://sc01.alicdn.com/kf/A048fd9fcb8f24ccf8f6ed50f972cfa60x.png" alt="Art of Details">
        </section>

        <!-- 4. 工艺流程 -->
        <section id="process" class="mt-4">
            <img src="https://sc01.alicdn.com/kf/A91a2ea19246d4196b73834e915c157c1U.jpg" alt="Factory Process">
        </section>

        <!-- 5. 物流包装 -->
        <section id="shipping" class="mt-4">
            <img src="https://sc01.alicdn.com/kf/A9b248ae5cf6d4aa2bad6f42f4dfbba36p.jpg" alt="Safe Shipping">
        </section>

        <!-- 6. 客户评价 -->
        <section id="reviews" class="mt-4">
            <img src="https://sc01.alicdn.com/kf/A172d612614dd4cc8aa0e07e126263aa5O.png" alt="Customer Reviews">
        </section>

        <!-- 底部呼吁按钮 -->
        <div class="px-6 mt-12">
            <button class="w-full bg-black text-white py-5 rounded-none font-bold tracking-widest hover:bg-gray-800 transition-colors">
                지금 구매하기 (BUY NOW)
            </button>
            <p class="text-center text-xs text-gray-400 mt-4 tracking-tighter">
                © 2026 LUXTREND INTERNATIONAL. All Rights Reserved.
            </p>
        </div>

    </main>

</body>
</html>
